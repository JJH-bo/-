<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微分方程知识城市 V6｜WebGL 纽约城区版</title>
  </head>
  <body>
    <div id="app">
      <canvas id="city-canvas"></canvas>
      <div id="loading" class="loading">
        <div class="loading-card">
          <h1>正在构建 V6.0.7 微分方程知识城市</h1>
          <div class="loading-bar"><span></span></div>
          <p>城市建模重构版：微分河、曼哈顿天际线、皇后方法街、布鲁克林工业区、应用海湾与风险训练场。</p>
        </div>
      </div>
      <header class="topbar">
        <div class="brand">
          <strong>V6 微分方程知识城市</strong>
          <span>纽约城区建模版｜WebGL 工程版</span>
        </div>
        <button id="btn-reset">全城</button>
        <button data-preset="entrance">入口港</button>
        <button data-preset="queens">皇后区</button>
        <button data-preset="brooklyn">布鲁克林</button>
        <button data-preset="manhattan">曼哈顿</button>
        <button data-preset="bay">应用海湾</button>
        <button data-preset="risk">风险场</button>
        <button id="btn-day-night">知识夜景</button>
        <button id="btn-metro">地铁关系线</button>
      </header>
      <aside id="info-panel" class="info-panel"></aside>
      <div id="label-layer" class="label-layer"></div>
      <footer class="hud">
        <span>拖拽旋转</span>
        <span>滚轮缩放</span>
        <span>点击城区/地标查看知识职责</span>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
