<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>V6.1 微分方程知识城市</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:#e6edf1;color:#17212b}#c{width:100%;height:100%;display:block}.bar{position:fixed;left:18px;top:16px;right:370px;z-index:5;display:flex;gap:8px;flex-wrap:wrap;pointer-events:none}.brand,.bar button,.panel,.hud{background:rgba(250,250,247,.88);border:1px solid rgba(190,198,202,.65);box-shadow:0 18px 52px rgba(36,52,64,.16);backdrop-filter:blur(16px)}.brand{border-radius:20px;padding:10px 14px;pointer-events:auto}.brand b{display:block;font-size:18px}.brand span{display:block;font-size:12px;color:#697984;margin-top:2px}.bar button{border-radius:14px;padding:9px 11px;font-weight:800;cursor:pointer;pointer-events:auto;color:#17212b}.panel{position:fixed;right:18px;top:18px;width:330px;max-height:calc(100vh - 36px);overflow:auto;z-index:6;border-radius:26px;padding:18px}.panel h2{margin:0 0 8px;font-size:21px}.panel p,.panel li{font-size:13px;line-height:1.7;color:#26333d}.pill{display:inline-block;background:#e7ecef;color:#455866;border-radius:999px;padding:4px 8px;margin:3px;font-size:12px;font-weight:800}.hud{position:fixed;left:24px;bottom:22px;z-index:6;border-radius:18px;padding:10px 12px;color:#697984;font-size:12px}.loading{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#eef3f5,#dbe5e9)}.card{width:min(760px,84vw);padding:46px;border-radius:34px;background:rgba(250,250,247,.94);text-align:center;box-shadow:0 24px 70px rgba(36,52,64,.16)}.card h1{margin:0 0 20px}.barline{height:14px;border-radius:999px;overflow:hidden;background:#d5dee3}.barline i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#6f7f82,#9fb5bc);animation:load .9s ease}@keyframes load{from{transform:translateX(-100%)}to{transform:none}}.label{position:fixed;z-index:4;transform:translate(-50%,-100%);padding:4px 7px;border-radius:10px;background:rgba(250,250,247,.76);border:1px solid rgba(190,198,202,.72);font-size:11px;font-weight:900;white-space:nowrap;pointer-events:none}.district{font-size:14px;padding:6px 10px;border-radius:14px}.night{background:#061525}.night .brand,.night .bar button,.night .panel,.night .hud{background:rgba(10,26,44,.86);color:#e6f2ff;border-color:rgba(88,145,190,.35)}.night .panel p,.night .panel li,.night .brand span,.night .hud{color:#a6bed6}.night .label{background:rgba(9,29,49,.78);color:#e6f2ff;border-color:rgba(88,145,190,.35)}
</style>
</head>
<body>
<canvas id="c"></canvas><div id="loading" class="loading"><div class="card"><h1>正在构建 V6.1 微分方程知识城市</h1><div class="barline"><i></i></div><p>城市骨架验收版：曼哈顿核心岛、皇后一阶网格、布鲁克林工业区、应用海湾、红钩风险训练场与微分河。</p></div></div>
<header class="bar"><div class="brand"><b>V6.1 微分方程知识城市</b><span>城市规划模型感｜纽约城区骨架验收版</span></div><button data-view="all">全城</button><button data-view="queens">皇后区</button><button data-view="brooklyn">布鲁克林</button><button data-view="manhattan">曼哈顿</button><button data-view="bay">应用海湾</button><button data-view="risk">风险场</button><button id="night">知识夜景</button></header>
<aside id="panel" class="panel"><h2>V6.1 城市骨架验收</h2><p>这版先验收城市本体：远看像城市，中看能分区，近看核心地标有数学含义。点击城区或地标查看职责。</p><p><span class="pill">70% 城市肌理</span><span class="pill">30% 知识地标</span><span class="pill">白天城市化</span><span class="pill">夜景知识化</span></p></aside><footer class="hud">拖拽旋转｜滚轮缩放｜点击城区/核心地标</footer>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.161.0';
const canvas=document.getElementById('c'),panel=document.getElementById('panel');
const scene=new THREE.Scene();scene.background=new THREE.Color(0xe6edf1);scene.fog=new THREE.Fog(0xe6edf1,1150,3100);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,1,5400);let target=new THREE.Vector3(60,0,60),dist=1380,theta=-.72,phi=.92;
const pick=[],labels=[];let night=false;
const matCache=new Map();function mat(c,o={}){let k=c+JSON.stringify(o);if(matCache.has(k))return matCache.get(k);let m=new THREE.MeshStandardMaterial({color:c,roughness:o.roughness??.72,metalness:o.metalness??.04,transparent:o.transparent??false,opacity:o.opacity??1,emissive:o.emissive??0,emissiveIntensity:o.emissiveIntensity??0});m.userData={base:c,glow:o.glow||o.emissive||0,intensity:o.nightIntensity??.35};matCache.set(k,m);return m}
function updateCam(){let s=Math.sin(phi);camera.position.set(target.x+dist*s*Math.sin(theta),target.y+dist*Math.cos(phi),target.z+dist*s*Math.cos(theta));camera.lookAt(target)}
function poly(points,color){let sh=new THREE.Shape();points.forEach((p,i)=>i?sh.lineTo(p[0],p[1]):sh.moveTo(p[0],p[1]));sh.closePath();let g=new THREE.ShapeGeometry(sh);g.rotateX(-Math.PI/2);let m=new THREE.Mesh(g,mat(color,{roughness:.86}));m.receiveShadow=true;scene.add(m);return m}
function box(x,z,w,d,h,c,name,data={}){let m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(c,{roughness:.64,metalness:.05,glow:data.glow||0,nightIntensity:data.intensity||.2}));m.position.set(x,h/2+2,z);m.castShadow=m.receiveShadow=true;m.name=name;m.userData=data;scene.add(m);if(data.pick)pick.push(m);return m}
function cyl(x,z,r,h,c,name,data={}){let m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,32),mat(c,{roughness:.6,glow:data.glow||0,nightIntensity:.25}));m.position.set(x,h/2+2,z);m.castShadow=m.receiveShadow=true;m.name=name;m.userData=data;scene.add(m);if(data.pick)pick.push(m);return m}
function path(points,width,color,name,data={}){let grp=new THREE.Group();for(let i=0;i<points.length-1;i++){let a=points[i],b=points[i+1],dx=b[0]-a[0],dz=b[1]-a[1],len=Math.hypot(dx,dz);let m=new THREE.Mesh(new THREE.BoxGeometry(len,.8,width),mat(color,{roughness:.78,glow:data.glow||0,nightIntensity:data.intensity||.25}));m.position.set((a[0]+b[0])/2,4,(a[1]+b[1])/2);m.rotation.y=-Math.atan2(dz,dx);grp.add(m)}grp.name=name;grp.userData=data;scene.add(grp);if(data.pick)pick.push(grp);return grp}
const water=new THREE.Mesh(new THREE.PlaneGeometry(2000,1500),mat(0x9db7bf,{transparent:true,opacity:.72,roughness:.52,glow:0x3fb7d8,nightIntensity:.12}));water.rotation.x=-Math.PI/2;water.position.y=-.1;scene.add(water);
path([[-150,-570],[-128,-410],[-112,-245],[-92,-70],[-60,110],[4,280],[120,460],[260,610]],54,0x7eaeb8,'微分河',{title:'微分河',desc:'变化率关系的主水系，切开皇后、曼哈顿与布鲁克林。',pick:true,glow:0x47c7ff,intensity:.26});
const districts=[
{id:'queens',name:'皇后·一阶方程区',p:[[-720,-360],[-250,-420],[-170,-240],[-180,130],[-300,285],[-690,230],[-760,40]],c:0xdedbd2,center:[-455,-60],size:[520,540],grid:[8,9],h:[16,58],math:['可分离变量','齐次型','一阶线性','伯努利','全微分']},
{id:'manhattan',name:'曼哈顿·高阶线性核心岛',p:[[34,-430],[240,-470],[304,-290],[284,72],[220,178],[80,154],[20,-40]],c:0xd8d9d5,center:[155,-140],size:[245,625],grid:[13,6],h:[46,205],math:['线性解结构','特征方程','重根','复根','非齐次特解']},
{id:'brooklyn',name:'布鲁克林·可降阶工业区',p:[[-30,195],[330,145],[420,330],[335,520],[55,508],[-105,365]],c:0xd2c8bb,center:[145,355],size:[455,340],grid:[5,8],h:[22,82],math:["p=y'",'缺y','缺x',"y''=p dp/dy"]},
{id:'entrance',name:'入口港·概念广场',p:[[-745,135],[-540,118],[-465,238],[-535,365],[-730,350],[-790,250]],c:0xe5e1d8,center:[-630,245],size:[270,220],grid:[4,5],h:[8,28],math:['定义','阶','通解','特解','初值']},
{id:'bay',name:'应用海湾·现实建模码头',p:[[330,75],[735,20],[810,215],[750,455],[420,505],[300,360]],c:0xd6d3c8,center:[560,270],size:[470,420],grid:[5,7],h:[10,48],math:['自行车轨迹','飞机减速','牛顿冷却']},
{id:'risk',name:'红钩·风险训练场',p:[[-280,470],[-80,440],[48,545],[-26,675],[-260,655],[-350,560]],c:0xd8c1b5,center:[-165,560],size:[285,190],grid:[3,5],h:[8,26],math:['除零丢解','对数绝对值','常数合并','初值定符号']},
{id:'grey',name:'灰岛·差分方程选学区',p:[[560,-515],[760,-535],[805,-400],[700,-320],[540,-365]],c:0xc8c8c2,center:[675,-430],size:[220,170],grid:[2,3],h:[8,18],math:['差分方程']}
];
function inside(x,z,pts){let ins=false;for(let i=0,j=pts.length-1;i<pts.length;j=i++) {let xi=pts[i][0],zi=pts[i][1],xj=pts[j][0],zj=pts[j][1];if(((zi>z)!=(zj>z))&&(x<(xj-xi)*(z-zi)/((zj-zi)||1e-6)+xi))ins=!ins}return ins}
function rnd(seed){return Math.abs(Math.sin(seed)*43758.5453)%1}
for(const d of districts){let m=poly(d.p,d.c);m.position.y=1;m.name=d.name;m.userData={title:d.name,desc:d.id==='manhattan'?'最难、最重要、最高密度的核心岛；特征方程中央塔压住全城。':'城区承担对应微分方程板块的空间职责。',math:d.math,pick:true};pick.push(m);addLabel(m,d.name,64,'district');let [rows,cols]=d.grid,[minH,maxH]=d.h,[cx,cz]=d.center,[sw,sd]=d.size;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){let lots=d.id==='manhattan'?2:1;for(let l=0;l<lots;l++){let x=cx-sw/2+sw*(c+.5)/cols+(lots==2?(l?sw/cols*.16:-sw/cols*.16):0),z=cz-sd/2+sd*(r+.5)/rows;if(!inside(x,z,d.p))continue;let seed=r*83+c*41+l*17+cx*.1;let h=minH+(maxH-minH)*(0.25+0.75*rnd(seed));if(d.id==='manhattan'){h+=Math.max(0,1-Math.hypot(x-150,z+190)/185)*105+Math.max(0,1-Math.hypot(x-214,z-26)/135)*58}let col=d.id==='manhattan'?[0xbfc5c9,0xd6d8d9,0xaeb8c2,0xc7c9c4][Math.floor(rnd(seed+5)*4)]:[0xc9c1b4,0xd8d0c2,0xb9b4aa,0xe0d7c8][Math.floor(rnd(seed+7)*4)];box(x,z,sw/cols*(d.id==='manhattan'?.24:.38),sd/rows*(d.id==='manhattan'?.48:.38),h,col,d.name+'肌理楼')}}}
function landmark(x,z,w,d,h,c,name,formula,desc,type='box'){let obj=type==='cyl'?cyl(x,z,w/2,h,c,name,{title:name,formula,desc,pick:true,glow:0x9fd7ff}):box(x,z,w,d,h,c,name,{title:name,formula,desc,pick:true,glow:0x9fd7ff});addLabel(obj,name,h+24,'');return obj}
landmark(150,-190,74,74,262,0x9eabb8,'特征方程中央塔','r²+pr+q=0','指数试探把微分问题压缩为代数问题，全城最高地标。');landmark(82,-246,58,58,150,0xb8c0c8,'线性解结构大楼','y=C₁y₁+C₂y₂','线性方程的核心是解空间结构。');landmark(96,-82,62,62,186,0xa6afb8,'重根摩天楼','(C₁+C₂x)e^(rx)','重根必须生成新的线性无关解。');landmark(242,-82,60,60,176,0xa4a0b7,'复根旋转塔','e^(αx)(cosβx+sinβx)','复根带来指数衰增与三角振荡。', 'cyl');landmark(210,28,112,68,92,0xa8b3bb,'非齐次特解工厂','y=y_h+y_p','非齐次通解由齐次通解与一个特解叠加。');landmark(-375,-75,92,66,76,0x9ca8ad,'一阶线性馆',"y'+p(x)y=q(x)",'积分因子把左边补成乘积导数。');landmark(-525,42,88,52,72,0x8b8396,'伯努利转换门','z=y^(1-n)','非线性通过换元进入一阶线性体系。');landmark(75,310,58,58,138,0x8c7663,'可降阶总电梯','二阶→一阶',"把研究对象从 y 改成 p=y'。 ");landmark(205,285,104,70,68,0x9d8064,'缺 x 链式车间',"y''=p dp/dy",'p 的自变量从 x 转成 y。');landmark(475,205,92,70,58,0x8ba49f,'自行车轨迹馆','Q切线指向P','后轮轨迹切线方向始终指向前轮位置。');landmark(625,330,58,58,122,0x8aa099,'牛顿冷却实验塔','T=T₀+Ce^(-kt)','温度曲线指数逼近环境温度。','cyl');landmark(-198,552,62,62,26,0xb94a37,'除零丢解坑','除以前查零因子','分离变量、伯努利等过程最容易在除法中丢解。','cyl');
path([[-665,245],[-515,42],[-375,-75],[-35,260],[150,-190],[270,108],[520,245]],13,0x4b5563,'张宇主线大道',{title:'张宇主线大道',desc:'概念→一阶→可降阶→高阶线性→欧拉→应用。白天是主路，夜景才发光成学习路径。',pick:true,glow:0x6db6ff});path([[270,108],[345,160],[430,225]],15,0x9c8b6b,'欧拉跨江大桥',{title:'欧拉跨江大桥',formula:'x=e^t',desc:'幂结构通过 x=e^t 接入常系数线性体系。',pick:true,glow:0xffd15a,intensity:.55});path([[-235,565],[-198,552],[-110,535],[-60,575],[-125,625]],9,0x9d4b39,'风险警戒线',{title:'风险警戒线',desc:'风险点训练路线。',pick:true,glow:0xff5d42,intensity:.48});
const metro=[];function metroLine(pts,c,n){let g=path(pts,4,c,n,{title:n,desc:'夜景知识关系线',pick:false,glow:c,intensity:.8});g.visible=false;metro.push(g)}metroLine([[-665,245],[-375,-75],[75,310],[150,-190],[270,108],[625,330]],0x2d79d8,'蓝线：章节主线');metroLine([[-525,42],[-375,-75],[150,-190],[270,108]],0x8b5cf6,'紫线：线性化线');metroLine([[-198,552],[-110,535],[-60,575],[-125,625]],0xef4444,'红线：风险提醒线');
function addLabel(obj,text,off,cls){let e=document.createElement('div');e.className='label '+cls;e.textContent=text;document.body.appendChild(e);labels.push({obj,e,off,cls})}
function renderLabels(){let rect=renderer.domElement.getBoundingClientRect(),v=new THREE.Vector3();for(const L of labels){L.obj.getWorldPosition(v);v.y+=L.off;v.project(camera);let d=camera.position.distanceTo(target),hide=v.z>1||d<420||(!L.cls&&d>1550);L.e.style.display=hide?'none':'block';L.e.style.left=((v.x*.5+.5)*rect.width)+'px';L.e.style.top=((-v.y*.5+.5)*rect.height)+'px'}}
scene.add(new THREE.HemisphereLight(0xffffff,0xb9cbd0,1.55));let sun=new THREE.DirectionalLight(0xffffff,3.2);sun.position.set(-620,980,720);sun.castShadow=true;scene.add(sun);
let drag=false,last={x:0,y:0};canvas.onpointerdown=e=>{drag=true;last.x=e.clientX;last.y=e.clientY};onpointerup=()=>drag=false;onpointermove=e=>{if(!drag)return;theta-=(e.clientX-last.x)*.006;phi=Math.max(.32,Math.min(1.36,phi+(e.clientY-last.y)*.004));last.x=e.clientX;last.y=e.clientY;updateCam()};canvas.onwheel=e=>{e.preventDefault();dist=Math.max(260,Math.min(2550,dist*(e.deltaY>0?1.08:.92)));updateCam()};
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2();canvas.onclick=e=>{let r=canvas.getBoundingClientRect();mouse.x=(e.clientX-r.left)/r.width*2-1;mouse.y=-(e.clientY-r.top)/r.height*2+1;ray.setFromCamera(mouse,camera);let h=ray.intersectObjects(pick,true)[0];if(!h)return;let o=h.object;while(o.parent&&!o.userData.title)o=o.parent;let u=o.userData;panel.innerHTML='<h2>'+escapeHtml(u.title||o.name)+'</h2>'+(u.formula?'<p><b>公式牌匾：</b>'+escapeHtml(u.formula)+'</p>':'')+'<p>'+escapeHtml(u.desc||'城市对象')+'</p>'+(u.math?'<p>'+u.math.map(x=>'<span class="pill">'+escapeHtml(x)+'</span>').join('')+'</p>':'')};function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{let v=b.dataset.view,p={all:[[980,760,1080],[60,0,60]],queens:[[-770,430,230],[-455,0,-60]],brooklyn:[[140,440,720],[145,0,355]],manhattan:[[560,520,280],[155,0,-140]],bay:[[850,410,520],[560,0,270]],risk:[[-120,330,820],[-165,0,560]]}[v];camera.position.set(...p[0]);target.set(...p[1]);dist=camera.position.distanceTo(target);let off=camera.position.clone().sub(target);theta=Math.atan2(off.x,off.z);phi=Math.acos(off.y/dist);updateCam()});document.getElementById('night').onclick=()=>{night=!night;document.body.classList.toggle('night',night);scene.background.setHex(night?0x061525:0xe6edf1);scene.fog.color.setHex(night?0x061525:0xe6edf1);metro.forEach(g=>g.visible=night);scene.traverse(o=>{if(!o.material)return;let arr=Array.isArray(o.material)?o.material:[o.material];arr.forEach(m=>{if(m.userData.base===undefined)return;if(night){let c=new THREE.Color(m.userData.base).lerp(new THREE.Color(0x071827),.46);m.color.copy(c);if(m.userData.glow){m.emissive.setHex(m.userData.glow);m.emissiveIntensity=m.userData.intensity||.35}}else{m.color.setHex(m.userData.base);m.emissive.setHex(0);m.emissiveIntensity=0}})})};
function resize(){renderer.setSize(innerWidth,innerHeight,false);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}onresize=resize;resize();updateCam();setTimeout(()=>document.getElementById('loading')?.remove(),650);(function loop(){renderLabels();renderer.render(scene,camera);requestAnimationFrame(loop)})();
</script>
</body></html>
