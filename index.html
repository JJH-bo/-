<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V6.3 微分方程知识城市｜曼哈顿全岛版</title>
  </head>
  <body>
    <div id="app">
      <canvas id="city-canvas"></canvas>
      <div id="loading" class="loading">
        <div class="loading-card">
          <h1>正在构建 V6.3 曼哈顿全岛微分方程知识城市</h1>
          <div class="loading-bar"><span></span></div>
          <p>主城：曼哈顿全岛。附属岛屿：Liberty Island 概念入口、Governors Island 风险训练场、Grey Island 差分选学。</p>
        </div>
      </div>
      <header class="topbar">
        <div class="brand">
          <strong>V6.3 微分方程知识城市</strong>
          <span>曼哈顿全岛 + 附属岛屿｜模块化工程版</span>
        </div>
        <button data-preset="overview">全城</button>
        <button data-preset="concept">概念入口</button>
        <button data-preset="first">一阶街区</button>
        <button data-preset="reduction">可降阶工厂</button>
        <button data-preset="linear">高阶核心</button>
        <button data-preset="geometry">几何应用</button>
        <button data-preset="physics">物理码头</button>
        <button data-preset="risk">风险岛</button>
        <button id="btn-day-night">知识夜景</button>
      </header>
      <aside id="info-panel" class="info-panel"></aside>
      <div id="label-layer" class="label-layer"></div>
      <footer class="hud">
        <span>拖拽旋转</span>
        <span>滚轮缩放</span>
        <span>点击城区/地标查看知识职责</span>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
