<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微分方程知识城市 V6｜WebGL 纽约城区版</title>
  </head>
  <body>
    <div id="app">
      <canvas id="city-canvas"></canvas>
      <div id="loading" class="loading">
        <div class="loading-card">
          <h1>正在构建 V6 微分方程知识城市</h1>
          <div class="loading-bar"><span></span></div>
          <p>曼哈顿高阶线性核心岛、皇后一阶城区、布鲁克林可降阶工业区、微分河、欧拉桥、应用海湾加载中。</p>
        </div>
      </div>
      <header class="topbar">
        <div class="brand">
          <strong>V6 微分方程知识城市</strong>
          <span>纽约城区建模版｜WebGL 工程版</span>
        </div>
        <button id="btn-reset">回到全城</button>
        <button id="btn-day-night">知识夜景</button>
        <button id="btn-metro">地铁关系线</button>
      </header>
      <aside id="info-panel" class="info-panel"></aside>
      <div id="label-layer" class="label-layer"></div>
      <footer class="hud">
        <span>拖拽旋转</span>
        <span>滚轮缩放</span>
        <span>点击城区/地标查看知识职责</span>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
